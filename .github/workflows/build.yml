name: Build and Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'build.py'
  workflow_dispatch:

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    # Node 20 廃止の警告を消し、Node 24 を先行利用する設定
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run build script
        run: |
          python build.py
          echo "Checking if index.html was created..."
          ls -l index.html

      - name: Check for changes and Commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          
          git add index.html
          
          echo "=== GIT STATUS ==="
          git status
          
          # 差分の有無を判定して詳細に報告
          if git diff --staged --quiet; then
            echo "RESULT: No changes detected in index.html compared to the repository version."
            exit 0
          else
            echo "RESULT: Changes detected! Committing now..."
            git commit -m "Auto-build: Update index.html [skip ci]"
            git push origin main
            echo "Push complete."
          fi