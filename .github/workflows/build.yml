name: Build and Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'build.py'
  workflow_dispatch:

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run build script
        run: |
          python build.py
          echo "Build script output check:"
          cat index.html | head -n 20 # 最初の20行をログに出力して確認

      - name: Force Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          
          git add index.html
          
          # 差分がある場合のみプッシュ、なければログを出す
          if git diff --staged --quiet; then
            echo "No changes in index.html to commit."
          else
            git commit -m "Auto-build: Update index.html [skip ci]"
            git push origin main
          fi